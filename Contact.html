<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - The World Manifesto</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        a.back-link {
            color: #666;
            text-decoration: none;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 30px;
        }
        a.back-link:hover {
            color: #1a1a1a;
        }
        h1 {
            font-size: 28px;
            font-weight: normal;
            margin-bottom: 10px;
        }
        p.subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 14px;
            color: #555;
        }
        input[type="email"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            font-family: inherit;
            font-size: 16px;
            box-sizing: border-box;
            background-color: #fafafa;
        }
        input[type="email"]:focus, textarea:focus {
            border-color: #1a1a1a;
            outline: none;
            background-color: #fff;
        }
        button {
            background: #1a1a1a;
            color: #fff;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-family: inherit;
            cursor: pointer;
            align-self: flex-start;
        }
        button:hover {
            background: #333;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Länk tillbaka till startsidan -->
    <a href="index.html" class="back-link">← Back to Manifesto</a>

    <h1>Contact</h1>
    <p class="subtitle">Send a message regarding the organization or the structural models.</p>

    <!-- Formulär via Web3Forms (Helt Kinasäkert utan Google-blockeringar) -->
    <form action="https://api.web3forms.com/submit" method="POST">
        
        <!-- Din unika publika nyckel. Första gången du skickar får du ett aktiveringsmejl från Web3Forms till din Outlook -->
        <input type="hidden" name="access_key" value="97d90970-d4b4-4c74-a2fb-facc44c3be02">
        
        <!-- Honeypot spamskydd (osynligt för människor) -->
        <input type="checkbox" name="botcheck" class="hidden" style="display:none">

        <div class="form-group">
            <label for="email">Your E-mail Address</label>
            <input type="email" id="email" name="email" required placeholder="name@example.com">
        </div>

        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="8" required placeholder="Write your message here..."></textarea>
        </div>

        <button type="submit">Send Message</button>
    </form>
</div>

</body>
</html>
