<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The World Manifesto</title>
    <style>
        /* All design styrs lokalt för att klara brandväggar */
        body {
            font-family: Georgia, Cambria, "Times New Roman", Times, serif;
            line-height: 1.25; /* Behagligt radavstånd för läsning */
            color: #1a1a1a;
            background-color: #fcfcfc;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            border-bottom: 2px solid #333;
            padding-bottom: 30px;
            margin-bottom: 30px;
        }

        h1 {
            font-family: Georgia, serif;
            font-size: 36px; /* Exakt storlek enligt önskemål */
            font-weight: normal;
            color: #111;
            margin: 0;
        }

        main {
            font-size: 18px; /* Tydlig och läsvänlig storlek för boktext */
        }

        p {
            margin-bottom: 1.5rem;
            text-align: justify; /* Valfritt: ger raka marginaler som i en bok */
        }

        footer {
            margin-top: 50px;
            border-top: 1px solid #eee;
            padding-top: 20px;
            font-size: 14px;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>The World Manifesto</h1>
<img src="https://raw.githubusercontent.com/theworldmanifesto/theworldmanifesto.github.io/f836ed686d73627fa53296dc066bd8f93ad081d2/Freedom%20Staircase.jpg" alt="Freedom Staircase" style="width: 50%; height: auto;">
        </header>

        <main>
            <!-- HÄR KLISTRAR VI IN DIN TEXT -->
            <p>Här kan vi lägga in ditt manifest. Om du har texten redo är det bara att skicka över det första stycket eller kapitlet, så formaterar jag in det i koden åt dig med rätt HTML-taggar.</p>
        </main>

        <footer>
            <p>© 2026 The World Manifesto.</p>
        </footer>
    </div>

</body>
</html>
