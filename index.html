<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The World Manifesto</title>
    <style>
        body {
            font-family: Georgia, Cambria, "Times New Roman", Times, serif;
            line-height: 1.25;
            color: #1a1a1a;
            background-color: #fcfcfc;
            margin: 0;
            padding: 0;
        }

        .site-nav {
            width: 100%;
            background-color: #f7f7f7;
            border-bottom: 1px solid #e5e5e5;
            padding: 10px 0;
        }

        .nav-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: 1px solid #ccc;
            padding: 6px 12px;
            font-size: 16px;
            font-family: Georgia, serif;
            cursor: pointer;
            border-radius: 4px;
        }

        .menu-links {
            display: flex;
            gap: 20px;
            width: 100%;
            justify-content: center;
        }

        .menu-links a {
            color: #1a1a1a;
            text-decoration: none;
            font-size: 16px;
        }

        .menu-links a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .menu-toggle { display: block; margin: 0 auto; }
            .menu-links { display: none; flex-direction: column; text-align: center; gap: 12px; padding-top: 15px; }
            .menu-links.active { display: flex; }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            min-height: 85vh;
            justify-content: space-between;
        }

        main { text-align: center; }

        footer {
            margin-top: 60px;
            text-align: center;
            font-family: Georgia, serif;
        }

        .webmaster { font-size: 16px; margin-bottom: 15px; }
        .webmaster a { color: #1a1a1a; text-decoration: none; }
        .copyright { font-size: 14px; color: #666; }

        /* Slogan-box */
        #slogan-box {
            max-width: 680px;
            margin: 30px auto;
            border: 1px solid #ddd;
            border-radius: 16px;
            padding: 28px 24px;
            text-align: center;
        }

        #slogan-text {
            font-size: 22px;
            line-height: 1.45;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s;
            font-style: italic;
            color: #444;
        }

        .dots {
            display: flex;
            gap: 7px;
            justify-content: center;
            margin: 14px 0;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #ddd;
            cursor: pointer;
        }

        .dot.on { background: #111; }

        .btns {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
            font-family: sans-serif;
        }

        .b {
            padding: 7px 12px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .bx { background: #000; color: #fff; }
        .bf { background: #1877F2; color: #fff; }
        .bw { background: #25D366; color: #fff; }
        .bt { background: #26A5E4; color: #fff; }
        .bm { background: #666; color: #fff; }
        .bc { background: #fff; color: #000; border: 1px solid #ccc; }

        .lang-select {
            margin-top: 8px;
            padding: 4px 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 13px;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <div class="site-nav">
        <div class="nav-container">
            <button class="menu-toggle" onclick="document.querySelector('.menu-links').classList.toggle('active')">☰</button>
            <div class="menu-links">
                <a href="EN.html">English</a>
                <a href="ZH.html">简体中文</a>
                <a href="SV.html">Svenska</a>
                <a href="lang.html">🌐 More Languages</a>
            </div>
        </div>
    </div>

    <div class="container">
        <main>
            <h1 style="font-size: 36px; font-weight: normal; margin-bottom: 5px;">The World Manifesto</h1>

            <div style="margin-bottom: 25px;">
                <img src="https://raw.githubusercontent.com/theworldmanifesto/theworldmanifesto.github.io/f836ed686d73627fa53296dc066bd8f93ad081d2/Freedom%20Staircase.jpg" alt="Freedom Staircase" style="width: 75%; height: auto;">
            </div>

            <div style="max-width: 450px; margin: 0 auto 25px auto; font-family: Georgia, serif;">
                <div style="display: flex; justify-content: space-between; font-size: 32px; margin-bottom: 5px; padding: 0 40px;">
                    <div style="flex: 1; text-align: center;"><a href="EN.html" style="text-decoration: none;">🇬🇧</a></div>
                    <div style="flex: 1; text-align: center;"><a href="ZH.html" style="text-decoration: none;">🇨🇳</a></div>
                    <div style="flex: 1; text-align: center;"><a href="SV.html" style="text-decoration: none;">🇸🇪</a></div>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 18px; color: #666;">
                    <div style="flex: 1; text-align: center;">| &nbsp; <a href="EN.html" style="color: #1a1a1a; text-decoration: none;">English</a> &nbsp; |</div>
                    <div style="flex: 1; text-align: center;">| &nbsp; <a href="ZH.html" style="color: #1a1a1a; text-decoration: none;">简体中文</a> &nbsp; |</div>
                    <div style="flex: 1; text-align: center;">| &nbsp; <a href="SV.html" style="color: #1a1a1a; text-decoration: none;">Svenska</a> &nbsp; |</div>
                </div>
            </div>

            <div style="font-size: 18px; color: #666; margin-bottom: 10px;">
                | &nbsp; 🌐 &nbsp; <a href="lang.html" style="color: #1a1a1a; text-decoration: none;">More Languages</a> &nbsp; |
            </div>

            <!-- Slogan-box mellan More Languages och E-mail webbmaster -->
            <div id="slogan-box">
                <div id="slogan-text"></div>
                <div id="dots" class="dots"></div>
                <div class="btns">
                    <a id="btn-x" class="b bx" href="#">Share on X</a>
                    <a id="btn-fb" class="b bf" href="#">Facebook</a>
                    <a id="btn-wa" class="b bw" href="#">WhatsApp</a>
                    <a id="btn-tg" class="b bt" href="#">Telegram</a>
                    <a id="btn-em" class="b bm" href="#">Email</a>
                    <a id="btn-copy" class="b bc" href="#">Copy Link</a>
                </div>
                <select id="lang-select" class="lang-select" onchange="if(this.value)window.location.href='?lang='+this.value">
                    <option value="en">English</option>
                    <option value="zh">中文</option>
                    <option value="hi">हिन्दी</option>
                    <option value="es">Español</option>
                    <option value="fr">Français</option>
                    <option value="ar">العربية</option>
                    <option value="bn">বাংলা</option>
                    <option value="pt">Português</option>
                    <option value="ru">Русский</option>
                    <option value="ur">اردو</option>
                    <option value="id">Bahasa Indonesia</option>
                    <option value="de">Deutsch</option>
                    <option value="ja">日本語</option>
                    <option value="sw">Kiswahili</option>
                    <option value="tl">Filipino</option>
                    <option value="tr">Türkçe</option>
                    <option value="vi">Tiếng Việt</option>
                    <option value="ko">한국어</option>
                    <option value="fa">فارسی</option>
                    <option value="th">ไทย</option>
                    <option value="it">Italiano</option>
                    <option value="pl">Polski</option>
                    <option value="uk">Українська</option>
                    <option value="nl">Nederlands</option>
                    <option value="ro">Română</option>
                    <option value="el">Ελληνικά</option>
                    <option value="hu">Magyar</option>
                    <option value="cs">Čeština</option>
                    <option value="sv">Svenska</option>
                    <option value="bg">Български</option>
                    <option value="hr">Hrvatski</option>
                    <option value="sk">Slovenčina</option>
                    <option value="no">Norsk</option>
                    <option value="da">Dansk</option>
                    <option value="fi">Suomi</option>
                    <option value="he">עברית</option>
                    <option value="af">Afrikaans</option>
                    <option value="zu">isiZulu</option>
                    <option value="xh">isiXhosa</option>
                    <option value="is">Íslenska</option>
                    <option value="fo">Føroyskt</option>
                    <option value="crs">Seselwa</option>
                    <option value="se">Davvisámegiella</option>
                    <option value="fit">Meänkieli</option>
                </select>
            </div>

        </main>

        <footer>
            <div class="webmaster">
                <a href="mailto:theworldmanifesto@outlook.com">✉️ &nbsp;E-mail webbmaster</a>
            </div>
            <div class="copyright">
                The World Manifesto &nbsp; &nbsp; – &nbsp; &nbsp; Published 2026
            </div>
        </footer>
    </div>

    <script>
        const PAGE = "https://sites.google.com/view/worldmanifesto/";
        const MANIFESTO = "The World Manifesto";
        const COPIED = "Copied!";

        const urlParams = new URLSearchParams(window.location.search);
        const currentLang = (urlParams.get('lang') || 'sv').toUpperCase();

        document.getElementById('lang-select').value = (urlParams.get('lang') || 'sv').toLowerCase();

        let slogans = [];
        let i = 0, paused = false;

        const btnX = document.getElementById('btn-x');
        const btnFb = document.getElementById('btn-fb');
        const btnWa = document.getElementById('btn-wa');
        const btnTg = document.getElementById('btn-tg');
        const btnEm = document.getElementById('btn-em');
        const btnCopy = document.getElementById('btn-copy');
        const q = document.getElementById('slogan-text');
        const dots = document.getElementById('dots');

        function openNew(u) { window.open(u, '_blank', 'noopener'); }

        function show() {
            q.style.opacity = 0;
            setTimeout(() => {
                const t = slogans[i];
                const share = '"' + t + '" ' + PAGE;
                q.textContent = '"' + t + '"';
                q.style.opacity = 1;

                const uX = 'https://x.com/intent/tweet?text=' + encodeURIComponent(share);
                const uF = 'https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(PAGE) + '&quote=' + encodeURIComponent(t);
                const uW = 'https://wa.me/?text=' + encodeURIComponent(share);
                const uT = 'https://t.me/share/url?url=' + encodeURIComponent(PAGE) + '&text=' + encodeURIComponent('"' + t + '"');
                const uM = 'mailto:?subject=' + encodeURIComponent(MANIFESTO) + '&body=' + encodeURIComponent(share);

                btnX.onclick = (e) => { e.preventDefault(); openNew(uX); };
                btnFb.onclick = (e) => { e.preventDefault(); openNew(uF); };
                btnWa.onclick = (e) => { e.preventDefault(); openNew(uW); };
                btnTg.onclick = (e) => { e.preventDefault(); openNew(uT); };
                btnEm.onclick = (e) => { e.preventDefault(); window.location.href = uM; };
                btnCopy.onclick = (e) => {
                    e.preventDefault();
                    navigator.clipboard.writeText(share);
                    const old = btnCopy.textContent;
                    btnCopy.textContent = COPIED;
                    setTimeout(() => btnCopy.textContent = old, 1200);
                };

                [...dots.children].forEach((a, b) => a.className = b === i ? 'dot on' : 'dot');
            }, 200);
        }

        document.getElementById('slogan-box').onmouseenter = () => paused = true;
        document.getElementById('slogan-box').onmouseleave = () => paused = false;

        function next() {
            if (!paused && slogans.length > 0) {
                i = (i + 1) % slogans.length;
                show();
            }
        }

        fetch('world_manifesto_slogans.json')
            .then(response => {
                if (!response.ok) throw new Error('Kunde inte läsa JSON');
                return response.json();
            })
            .then(data => {
                const slogansData = data[currentLang] || data['SV'] || data['EN'] || {};
                slogans = Object.values(slogansData);

                if (slogans.length > 0) {
                    slogans.forEach((_, idx) => {
                        const d = document.createElement('span');
                        d.className = 'dot' + (idx === 0 ? ' on' : '');
                        d.onclick = () => { i = idx; show(); };
                        dots.appendChild(d);
                    });
                    show();
                    setInterval(next, 10000);
                }
            })
            .catch(err => console.error('Fel:', err));
    </script>

</body>
</html>
