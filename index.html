</div>

<script>
    try {
        // Kollar webbläsarens tidszon lokalt
        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        
        // Om besökaren INTE är i Kinas tidszoner, aktivera sektionen
        if (tz !== 'Asia/Shanghai' && tz !== 'Asia/Chongqing' && tz !== 'Asia/Urumqi') {
            document.getElementById('extra-content').style.display = 'block';
        }
    } catch (e) {
        // Fallback om webbläsaren blockerar tidszonskollen
        document.getElementById('extra-content').style.display = 'block';
    }
</script>
