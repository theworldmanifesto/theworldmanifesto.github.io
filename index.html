<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The World Manifesto</title>
    <style>
        /* All design styrs lokalt, inga externa resurser eller Google-fonter laddas */
        body {
            font-family: Georgia, Cambria, "Times New Roman", Times, serif;
            line-height: 1.6;
            color: #1a1a1a;
            background-color: #fcfcfc;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center; /* Centrerar titeln horisontellt */
            border-bottom: 2px solid #333;
            padding-bottom: 30px;
            margin-bottom: 30px;
        }

        h1 {
            font-family: Georgia, serif;
            font-size: 36px; /* Exakt storlek enligt önskemål */
            font-weight: normal; /* Normal textvikt, inte fetstil */
            color: #111;
            margin: 0;
        }

        main {
            font-size: 1.15rem;
        }

        p {
            margin-bottom: 1.5rem;
        }

        footer {
            margin-top: 50px;
            border-top: 1px solid #eee;
            padding-top: 20px;
            font-size: 0.9rem;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>The World Manifesto</h1>
        </header>

        <main>
            <!-- Här klistrar vi in din text -->
            <p>Detta är startpunkten för webbplatsen. Texten som läggs till här kommer att ärva det rena Georgia-typsnittet, vilket är säkert mot brandväggar och fungerar överallt.</p>
        </main>

        <footer>
            <p>© 2026 The World Manifesto.</p>
        </footer>
    </div>

</body>
</html>
